<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator - UTS Pemrograman Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        utama: '#2563eb',
                        aksi: '#f59e0b',
                        gelap: '#1e293b',
                        terang: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tombol {
                @apply w-16 h-16 md:w-20 md:h-20 rounded-lg text-lg font-bold shadow-md transition-all duration-150 active:scale-95 hover:opacity-90;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br dari-biru-100 ke-biru-200 min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300 dark:bg-gradient-to-br dark:from-gray-800 dark:ke-gray-900">

    <!-- BAGIAN NAMA DAN NIM -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Kalkulator Sederhana</h1>
        <p class="text-gray-600 dark:text-gray-300 mt-1">Nama : Muji Marta Qodri</p>
        <p class="text-gray-600 dark:text-gray-300">NIM : 231011450177</p>
    </div>

    <!-- KOTAK KALKULATOR -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-5 w-full max-w-xs">
        <!-- LAYAR TAMPILAN -->
        <div class="flex justify-between items-center mb-4">
            <button id="tombolTema" class="text-gray-600 dark:text-gray-300 text-xl hover:scale-110 transition-transform">
                <i class="fa fa-moon-o dark:hidden"></i>
                <i class="fa fa-sun-o hidden dark:inline-block"></i>
            </button>
            <div class="w-full text-right">
                <input type="text" id="layar" readonly value="0" 
                    class="w-full text-right text-3xl font-bold bg-transparent border-none outline-none text-gray-800 dark:text-white">
                <p id="keterangan" class="text-sm text-gray-500 dark:text-gray-400 h-5 mt-1"></p>
            </div>
        </div>

        <!-- BARIS TOMBOL 1 -->
        <div class="grid grid-cols-4 gap-2 mb-2">
            <button class="tombol bg-red-500 text-white" onclick="hapusSemua()">AC</button>
            <button class="tombol bg-gray-200 dark:bg-gray-700 dark:text-white" onclick="hapusSatu()"><i class="fa fa-times"></i></button>
            <button class="tombol bg-gray-200 dark:bg-gray-700 dark:text-white" onclick="tambahSimbol('%')">%</button>
            <button class="tombol bg-aksi text-white" onclick="tambahSimbol('/')"><i class="fa fa-divide"></i></button>
        </div>

        <!-- BARIS TOMBOL 2 -->
        <div class="grid grid-cols-4 gap-2 mb-2">
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('7')">7</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('8')">8</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('9')">9</button>
            <button class="tombol bg-aksi text-white" onclick="tambahSimbol('*')"><i class="fa fa-times"></i></button>
        </div>

        <!-- BARIS TOMBOL 3 -->
        <div class="grid grid-cols-4 gap-2 mb-2">
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('4')">4</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('5')">5</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('6')">6</button>
            <button class="tombol bg-aksi text-white" onclick="tambahSimbol('-')"><i class="fa fa-minus"></i></button>
        </div>

        <!-- BARIS TOMBOL 4 -->
        <div class="grid grid-cols-4 gap-2 mb-2">
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('1')">1</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('2')">2</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('3')">3</button>
            <button class="tombol bg-aksi text-white" onclick="tambahSimbol('+')"><i class="fa fa-plus"></i></button>
        </div>

        <!-- BARIS TOMBOL 5 -->
        <div class="grid grid-cols-4 gap-2">
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahSimbol('-')">+/-</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('0')">0</button>
            <button class="tombol bg-gray-100 dark:bg-gray-600 dark:text-white" onclick="tambahAngka('.')">,</button>
            <button class="tombol bg-utama text-white" onclick="hitung()"><i class="fa fa-equals"></i></button>
        </div>
    </div>

    <script>
        // Ambil elemen dari halaman
        const layar = document.getElementById('layar');
        const keterangan = document.getElementById('keterangan');
        const tombolTema = document.getElementById('tombolTema');
        let nilai = ''; // Menyimpan semua angka dan simbol yang dimasukkan

        // Fungsi ganti tema terang/gelap
        tombolTema.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        // Fungsi memasukkan angka
        function tambahAngka(angka) {
            // Cegah memasukkan koma lebih dari satu kali
            if (angka === '.' && nilai.includes('.')) return;
            nilai += angka;
            layar.value = nilai;
            keterangan.textContent = '';
        }

        // Fungsi memasukkan simbol hitung
        function tambahSimbol(simbol) {
            // Cegah memulai dengan simbol atau menambah simbol berturut-turut
            if (nilai === '' || isNaN(nilai.slice(-1))) return;
            nilai += simbol;
            layar.value = nilai;
        }

        // Fungsi menghitung hasil
        function hitung() {
            // Validasi: tidak boleh kosong, tidak boleh diakhiri simbol
            if (nilai === '' || isNaN(nilai.slice(-1))) {
                keterangan.textContent = '⚠️ Masukkan angka yang benar!';
                return;
            }

            try {
                // Lakukan perhitungan
                let hasil = eval(nilai);
                // Tampilkan hasil
                keterangan.textContent = `Hasil = ${hasil}`;
                layar.value = hasil;
                // Simpan hasil untuk perhitungan selanjutnya
                nilai = hasil.toString();
            } catch (kesalahan) {
                keterangan.textContent = '❌ Perhitungan tidak valid!';
                nilai = '';
                layar.value = '0';
            }
        }

        // Fungsi hapus semua
        function hapusSemua() {
            nilai = '';
            layar.value = '0';
            keterangan.textContent = '';
        }

        // Fungsi hapus satu karakter terakhir
        function hapusSatu() {
            nilai = nilai.slice(0, -1);
            layar.value = nilai || '0';
            keterangan.textContent = '';
        }
    </script>
</body>
</html>
