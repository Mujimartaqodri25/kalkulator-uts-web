<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana - UTS Pemrograman Web 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B95',
                        secondary: '#FF9A5C',
                        light: '#F8F9FA',
                        dark: '#121212'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tombol-angka {
                @apply w-16 h-16 md:w-20 md:h-20 rounded-xl text-xl font-semibold shadow-md active:scale-95 transition-transform duration-150;
            }
            .tombol-opsi {
                @apply w-16 h-16 md:w-20 md:h-20 rounded-xl text-lg font-bold shadow-md active:scale-95 transition-transform duration-150;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#FF6B95]/20 to-[#FF9A5C]/20 min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300">
    
    <!-- BAGIAN NAMA DAN NIM -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Kalkulator Sederhana</h1>
        <p class="text-gray-600 dark:text-gray-300 mt-1">Nama : Muji Marta Qodri</p>
        <p class="text-gray-600 dark:text-gray-300">NIM : 231011450177</p>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-2xl p-6 w-full max-w-xs md:max-w-sm transition-colors duration-300">
        <div class="flex justify-between items-center mb-6">
            <div class="text-right w-full">
                <input type="text" id="layar" readonly placeholder="0" 
                    class="w-full text-right text-3xl md:text-4xl font-bold bg-transparent border-none outline-none dark:text-white">
                <p id="hasil-sementara" class="text-right text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
            </div>
            <button id="tombolTema" class="ml-4 text-gray-600 dark:text-gray-300 text-xl hover:scale-110 transition-transform">
                <i class="fa fa-moon-o dark:hidden"></i>
                <i class="fa fa-sun-o hidden dark:inline-block"></i>
            </button>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-4">
            <button class="tombol-opsi bg-red-500 text-white hover:bg-red-600" onclick="hapusSemua()">AC</button>
            <button class="tombol-opsi bg-gray-200 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600" onclick="hapusSatu()"><i class="fa fa-times"></i></button>
            <button class="tombol-opsi bg-gray-200 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600">%</button>
            <button class="tombol-opsi bg-[#FF9A5C] text-white hover:bg-[#e88a50]" onclick="tambahOperator('/')"><i class="fa fa-divide"></i></button>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-4">
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('7')">7</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('8')">8</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('9')">9</button>
            <button class="tombol-opsi bg-[#FF9A5C] text-white hover:bg-[#e88a50]" onclick="tambahOperator('*')"><i class="fa fa-times"></i></button>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-4">
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('4')">4</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('5')">5</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('6')">6</button>
            <button class="tombol-opsi bg-[#FF9A5C] text-white hover:bg-[#e88a50]" onclick="tambahOperator('-')"><i class="fa fa-minus"></i></button>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-4">
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('1')">1</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('2')">2</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('3')">3</button>
            <button class="tombol-opsi bg-[#FF9A5C] text-white hover:bg-[#e88a50]" onclick="tambahOperator('+')"><i class="fa fa-plus"></i></button>
        </div>

        <div class="grid grid-cols-4 gap-3">
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700">+/-</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('0')">0</button>
            <button class="tombol-angka bg-gray-100 dark:bg-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700" onclick="tambahAngka('.')">,</button>
            <button class="tombol-opsi bg-gradient-to-r from-[#FF6B95] to-[#FF9A5C] text-white hover:opacity-90" onclick="hitung()"><i class="fa fa-equals"></i></button>
        </div>
    </div>

    <script>
        const layar = document.getElementById('layar');
        const hasilSementara = document.getElementById('hasil-sementara');
        const tombolTema = document.getElementById('tombolTema');
        let ekspresi = '';

        // Fungsi ganti tema terang/gelap
        tombolTema.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        // Fungsi masukkan angka
        function tambahAngka(angka) {
            // Cegah memasukkan koma lebih dari satu kali
            if (angka === '.' && ekspresi.includes('.')) {
                return;
            }
            ekspresi += angka;
            layar.value = ekspresi;
        }

        // Fungsi masukkan operasi hitung
        function tambahOperator(operator) {
            // Cegah memulai atau menambah operasi di akhir yang tidak valid
            if (ekspresi === '' || isNaN(ekspresi.slice(-1))) {
                return;
            }
            ekspresi += operator;
            layar.value = ekspresi;
        }

        // Fungsi hitung hasil
        function hitung() {
            // Validasi: tidak boleh kosong atau diakhiri operasi
            if (ekspresi === '' || isNaN(ekspresi.slice(-1))) {
                alert('⚠️ Masukkan angka yang valid!\nTidak boleh kosong atau diakhiri dengan tanda operasi.');
                return;
            }

            try {
                // Lakukan perhitungan
                let hasil = eval(ekspresi);
                // Tampilkan hasil
                hasilSementara.textContent = `Hasil: ${hasil}`;
                layar.value = hasil;
                // Simpan hasil untuk perhitungan selanjutnya
                ekspresi = hasil.toString();
            } catch (error) {
                alert('❌ Ekspresi yang dimasukkan tidak valid!');
                ekspresi = '';
                layar.value = '0';
                hasilSementara.textContent = '';
            }
        }

        // Fungsi hapus semua
        function hapusSemua() {
            ekspresi = '';
            layar.value = '0';
            hasilSementara.textContent = '';
        }

        // Fungsi hapus satu karakter terakhir
        function hapusSatu() {
            ekspresi = ekspresi.slice(0, -1);
            layar.value = ekspresi || '0';
        }
    </script>
</body>
</html>
